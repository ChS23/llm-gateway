global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    fallback_scrape_protocol: PrometheusText0.0.4

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]
    fallback_scrape_protocol: PrometheusText0.0.4
