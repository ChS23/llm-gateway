[server]
host = "127.0.0.1"
port = 8080

[database]
url = "postgres://postgres:postgres@127.0.0.1:5432/llm_gateway"

[redis]
url = "redis://127.0.0.1:6379"

[telemetry]
otlp_endpoint = "http://127.0.0.1:4317"

[routing]
default_strategy = "round-robin"

# Three replicas of "mock-gpt" across different providers → round-robin
[[providers]]
name = "replica-1"
type = "mock"
base_url = "http://127.0.0.1:9001"
models = ["mock-gpt", "mock-fast"]
weight = 3

[[providers]]
name = "replica-2"
type = "mock"
base_url = "http://127.0.0.1:9002"
models = ["mock-gpt", "mock-slow"]
weight = 1

[[providers]]
name = "replica-3"
type = "mock"
base_url = "http://127.0.0.1:9003"
models = ["mock-gpt"]
weight = 1
